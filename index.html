<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAT Community</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* glass iOS */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* chat bubble */
.user {
  align-self: flex-end;
  background: #3a3a3c;
  color: white;
  padding: 10px;
  border-radius: 18px;
  max-width: 70%;
}

.bot {
  align-self: flex-start;
  background: #1c1c1e;
  color: #d1d1d6;
  padding: 10px;
  border-radius: 18px;
  max-width: 70%;
}

/* scroll horizontal */
.scroll-x {
  overflow-x: auto;
  display: flex;
  gap: 8px;
  padding-bottom: 4px;
}
.scroll-x::-webkit-scrollbar {
  display: none;
}
</style>
</head>

<body class="text-white">

<!-- NAV -->
<nav class="fixed top-0 w-full glass px-5 py-3 flex justify-between">
  <span class="font-semibold">🦇 BAT</span>
  <div class="space-x-4 text-sm text-gray-300">
    <a href="index.html">Home</a>
    <a href="team.html">Team</a>
    <a href="rules.html">Rules</a>
  </div>
</nav>

<!-- HERO -->
<section class="pt-24 px-6 text-center">
  <h1 class="text-3xl font-semibold">BAT Community</h1>
  <p class="text-gray-400 mt-2">
    Komunitas nocturnal. Aktif saat dunia tidur.
  </p>

  <a href="LINK_DISCORD"
     class="mt-6 inline-block bg-gray-700 px-6 py-3 rounded-full">
     Join Discord
  </a>
</section>

<!-- FEATURES -->
<section class="mt-10 px-6 space-y-4">
  <div class="glass p-4">🌙 Aktif malam</div>
  <div class="glass p-4">🎮 Mabar santai</div>
  <div class="glass p-4">💬 Tanpa toxic</div>
</section>

<!-- CHAT BUTTON -->
<div id="chat-btn"
 style="position:fixed;bottom:20px;right:20px;background:#2c2c2e;padding:14px;border-radius:50%;cursor:pointer;">
💬
</div>

<!-- CHAT BOX -->
<div id="chat-box"
 style="display:none;position:fixed;bottom:80px;right:10px;width:90%;max-width:360px;height:420px;padding:12px;"
 class="glass flex flex-col">

  <div class="text-sm mb-2 text-gray-300">BAT Assistant</div>

  <!-- CHAT -->
  <div id="chat-log"
   style="flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px;">
  </div>

  <!-- FAQ SCROLL -->
  <div class="scroll-x mt-2">

    <button onclick="send('join')" class="glass px-3 py-1 text-sm">Join</button>
    <button onclick="send('rules')" class="glass px-3 py-1 text-sm">Rules</button>
    <button onclick="send('jam')" class="glass px-3 py-1 text-sm">Jam</button>
    <button onclick="send('admin')" class="glass px-3 py-1 text-sm">Admin</button>
    <button onclick="send('mabar')" class="glass px-3 py-1 text-sm">Mabar</button>
    <button onclick="send('toxic')" class="glass px-3 py-1 text-sm">Toxic?</button>
    <button onclick="send('channel')" class="glass px-3 py-1 text-sm">Channel</button>
    <button onclick="send('intro')" class="glass px-3 py-1 text-sm">Intro</button>

  </div>

</div>

<script>
const btn = document.getElementById("chat-btn");
const box = document.getElementById("chat-box");
const log = document.getElementById("chat-log");

btn.onclick = () => {
  box.style.display = box.style.display === "none" ? "flex" : "none";
};

const data = {
  join: "Klik tombol Join Discord di atas.",
  rules: "Hormati member, no toxic, no spam.",
  jam: "Server umumnya aktif mulai jam 22.00 malam 🌙",
  admin: "Admin: Faelyn, Raraw, Vin | Co-owner: Aziels, Nasho",
  mabar: "Bisa mabar bareng member 🎮",
  toxic: "Tidak boleh toxic. Tujuan server santai.",
  channel: "Gunakan channel sesuai topik.",
  intro: "Member baru wajib say hi di #bat-nest."
};

function send(type){

  const user = document.createElement("div");
  user.className = "user";
  user.innerText = type;
  log.appendChild(user);

  setTimeout(()=>{
    const bot = document.createElement("div");
    bot.className = "bot";
    bot.innerText = data[type];
    log.appendChild(bot);

    log.scrollTop = log.scrollHeight;
  }, 300);
}
</script>

</body>
</html>
